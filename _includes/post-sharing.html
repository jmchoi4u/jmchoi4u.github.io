<!-- Share button with popup -->
{% assign _page_url = page.url | absolute_url | url_encode %}
{% assign _page_title = page.title | url_encode %}

<div class="share-inline">
  <button type="button" id="share-btn" class="share-simple-btn" aria-label="공유하기" title="공유하기">
    <i class="fas fa-share-alt"></i>
  </button>
  <div id="share-popup" class="share-popup">
    <a href="https://twitter.com/intent/tweet?url={{ _page_url }}&text={{ _page_title }}" target="_blank" rel="noopener" class="share-popup-item">
      <i class="fa-brands fa-x-twitter"></i> X (Twitter)
    </a>
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ _page_url }}" target="_blank" rel="noopener" class="share-popup-item">
      <i class="fab fa-facebook"></i> Facebook
    </a>
    <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ _page_url }}" target="_blank" rel="noopener" class="share-popup-item">
      <i class="fab fa-linkedin"></i> LinkedIn
    </a>
    <a href="https://t.me/share/url?url={{ _page_url }}&text={{ _page_title }}" target="_blank" rel="noopener" class="share-popup-item">
      <i class="fab fa-telegram"></i> Telegram
    </a>
    <button type="button" id="share-copy-link" class="share-popup-item">
      <i class="fas fa-link"></i> 링크 복사
    </button>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('share-btn');
    var popup = document.getElementById('share-popup');
    var copyBtn = document.getElementById('share-copy-link');
    if (!btn || !popup) return;

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      popup.classList.toggle('show');
    });
    document.addEventListener('click', function(e) {
      if (!popup.contains(e.target) && e.target !== btn) popup.classList.remove('show');
    });
    if (copyBtn) {
      copyBtn.addEventListener('click', function() {
        navigator.clipboard.writeText(window.location.href).then(function() {
          copyBtn.innerHTML = '<i class="fas fa-check"></i> 복사 완료!';
          setTimeout(function() { copyBtn.innerHTML = '<i class="fas fa-link"></i> 링크 복사'; }, 1500);
        });
        popup.classList.remove('show');
      });
    }
  });
</script>
