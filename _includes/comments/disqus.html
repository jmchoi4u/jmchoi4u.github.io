<!-- Preconnect for faster Disqus loading -->
<link rel="preconnect" href="https://{{ site.comments.disqus.shortname }}.disqus.com" crossorigin>
<link rel="preconnect" href="https://c.disquscdn.com" crossorigin>
<link rel="dns-prefetch" href="https://{{ site.comments.disqus.shortname }}.disqus.com">
<link rel="dns-prefetch" href="https://c.disquscdn.com">

<style>
  .disqus-wrapper{margin-top:2rem;padding:1.5rem;border:1px solid var(--btn-border-color,#e2e6ec);border-radius:14px;background:var(--card-bg,#fbfcfd)}
  .disqus-header{display:flex;align-items:center;gap:8px;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--btn-border-color,#eef1f4)}
  .disqus-header h3{margin:0;font-size:1rem;font-weight:600}
  .disqus-header-icon{font-size:1.1rem}
  #disqus_thread{min-height:120px}
  .disqus-footer{margin-top:0.5rem;text-align:center;font-size:0.75rem;color:var(--text-muted-color,#697586)}
  .disqus-footer a{color:var(--text-muted-color,#697586);text-decoration:none}
</style>

<script>
  var disqus_config = function () {
    this.page.url = '{{ page.url | absolute_url }}';
    this.page.identifier = '{{ page.url }}';
  };

  function addDisqus() {
    var wrapper = document.createElement('div');
    wrapper.className = 'disqus-wrapper';
    wrapper.innerHTML =
      '<div class="disqus-header">' +
        '<span class="disqus-header-icon">&#128172;</span>' +
        '<h3>댓글</h3>' +
      '</div>' +
      '<div id="disqus_thread"></div>' +
      '<div class="disqus-footer">Powered by <a href="https://disqus.com/" target="_blank" rel="noopener">Disqus</a></div>';

    var footer = document.querySelector('footer');
    footer.insertAdjacentElement('beforebegin', wrapper);
  }

  function reloadDisqus(event) {
    if (event.source === window && event.data && event.data.id === Theme.ID) {
      if (typeof DISQUS === 'undefined') return;
      if (document.readyState == 'complete') {
        DISQUS.reset({ reload: true, config: disqus_config });
      }
    }
  }

  addDisqus();

  if (Theme.switchable) {
    addEventListener('message', reloadDisqus);
  }

  // Load Disqus early using requestIdleCallback (won't block initial render)
  var _disqusLoaded = false;
  function loadDisqusEmbed() {
    if (_disqusLoaded) return;
    _disqusLoaded = true;
    var d = document, s = d.createElement('script');
    s.src = 'https://{{ site.comments.disqus.shortname }}.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.head || d.body).appendChild(s);
  }

  // Strategy: load during idle time after page load, or when scrolled near
  if ('requestIdleCallback' in window) {
    window.addEventListener('load', function() {
      requestIdleCallback(loadDisqusEmbed, { timeout: 3000 });
    });
  }

  // Fallback: IntersectionObserver with generous rootMargin (start loading 600px before visible)
  var disqusObserver = new IntersectionObserver(
    function (entries) {
      if (entries[0].isIntersecting) {
        loadDisqusEmbed();
        disqusObserver.disconnect();
      }
    },
    { threshold: [0], rootMargin: '600px' }
  );

  disqusObserver.observe(document.getElementById('disqus_thread'));
</script>
