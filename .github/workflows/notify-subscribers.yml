name: "Notify Subscribers"

on:
  push:
    branches: [main, master]
    paths:
      - "_posts/**"
  schedule:
    # Pages 예약 발행(09:00 KST) 이후 새로 공개된 글을 확인한다.
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "notify-subscribers"
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare recently published posts
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import subprocess
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          now = datetime.now(timezone.utc)
          window_start = now - timedelta(hours=48)
          payloads = []

          def scalar(value):
              return value.strip().strip("\"'")

          def parse_front_matter(content):
              if not content.startswith("---\n"):
                  return {}
              end = content.find("\n---\n", 4)
              if end == -1:
                  return {}

              front_matter = {}
              for line in content[4:end].splitlines():
                  if not line or line[0].isspace() or ":" not in line:
                      continue
                  key, value = line.split(":", 1)
                  front_matter[key.strip()] = scalar(value)
              return front_matter

          def was_unhidden(path, before_sha):
              try:
                  previous = subprocess.check_output(
                      ["git", "show", f"{before_sha}:{path}"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
              except subprocess.CalledProcessError:
                  return False
              before = parse_front_matter(previous)
              current = parse_front_matter(Path(path).read_text(encoding="utf-8"))
              return before.get("hidden", "false").lower() == "true" and current.get("hidden", "false").lower() != "true"

          event_name = os.environ.get("EVENT_NAME", "")
          candidate_files = set()
          if event_name == "push":
              before_sha = os.environ.get("BEFORE_SHA", "")
              after_sha = os.environ.get("AFTER_SHA", "HEAD")
              if before_sha and set(before_sha) != {"0"}:
                  diff = subprocess.check_output(
                      ["git", "diff", "--name-status", "-M", before_sha, after_sha, "--", "_posts/"],
                      text=True,
                  )
              else:
                  diff = subprocess.check_output(
                      ["git", "diff-tree", "--root", "--no-commit-id", "--name-status", "-r", after_sha, "--", "_posts/"],
                      text=True,
                  )
              for line in diff.splitlines():
                  parts = line.split("\t")
                  status = parts[0]
                  path = parts[-1]
                  if status.startswith(("A", "R", "C")):
                      candidate_files.add(path)
                  elif status.startswith("M") and was_unhidden(path, before_sha):
                      candidate_files.add(path)
          else:
              candidate_files.update(str(path) for path in Path("_posts").glob("*.md"))

          for file_name in sorted(candidate_files):
              file = Path(file_name)
              if not file.is_file():
                  continue
              content = file.read_text(encoding="utf-8")
              front_matter = parse_front_matter(content)

              if front_matter.get("hidden", "false").lower() == "true":
                  continue
              try:
                  published_at = datetime.strptime(front_matter.get("date", ""), "%Y-%m-%d %H:%M:%S %z")
              except ValueError:
                  continue
              if published_at > now:
                  continue
              if event_name != "push" and published_at < window_start:
                  continue

              permalink = front_matter.get("permalink", "").strip()
              if permalink:
                  path = "/" + permalink.strip("/")
              else:
                  slug = re.sub(r"^\d{4}-\d{2}-\d{2}-", "", file.stem)
                  path = f"/posts/{slug}"

              payloads.append({
                  "title": front_matter.get("title") or file.stem,
                  "url": "https://jmchoi4u.github.io" + path.rstrip("/") + "/",
                  "description": front_matter.get("description") or "",
              })

          with open("publishable-posts.jsonl", "w", encoding="utf-8") as output:
              for payload in payloads:
                  output.write(json.dumps(payload, ensure_ascii=False) + "\n")
          print(f"Prepared {len(payloads)} recently published post(s)")
          PY

      - name: Send idempotent notifications
        env:
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: |
          if [ ! -s publishable-posts.jsonl ]; then
            echo "No recently published posts"
            exit 0
          fi
          if [ -z "$NOTIFY_SECRET" ]; then
            echo "::error::NOTIFY_SECRET is not configured"
            exit 1
          fi

          while IFS= read -r payload; do
            post_url=$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["url"])' <<< "$payload")
            page_ready=false
            for attempt in 1 2 3 4 5 6; do
              if curl --fail --silent --show-error --location --head "$post_url" >/dev/null; then
                page_ready=true
                break
              fi
              sleep 10
            done
            if [ "$page_ready" != "true" ]; then
              echo "::error::Published page is not reachable: $post_url"
              exit 1
            fi

            curl --fail-with-body --show-error --silent --retry 2 \
              -X POST "https://jm-studio-auth.jmchoi4u.workers.dev/notify" \
              -H "Content-Type: application/json" \
              -H "X-Notify-Secret: ${NOTIFY_SECRET}" \
              --data-binary "$payload"
          done < publishable-posts.jsonl
