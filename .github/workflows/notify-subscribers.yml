name: "Notify Subscribers"
on:
  push:
    branches: [main, master]
    paths:
      - "_posts/**"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for new posts
        id: check
        run: |
          NEW_FILES=$(git diff --name-status HEAD~1 HEAD -- _posts/ | grep '^A' | awk '{print $2}')
          if [ -z "$NEW_FILES" ]; then
            echo "No new posts found"
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FIRST_FILE=$(echo "$NEW_FILES" | head -1)
          echo "New post: $FIRST_FILE"
          echo "has_new=true" >> "$GITHUB_OUTPUT"
          echo "file=$FIRST_FILE" >> "$GITHUB_OUTPUT"

      - name: Extract post info
        if: steps.check.outputs.has_new == 'true'
        id: info
        run: |
          FILE="${{ steps.check.outputs.file }}"
          CONTENT=$(cat "$FILE")

          TITLE=$(echo "$CONTENT" | grep -m1 '^title:' | sed 's/^title:\s*//' | sed 's/^["'"'"']//' | sed 's/["'"'"']$//')
          DESC=$(echo "$CONTENT" | grep -m1 '^description:' | sed 's/^description:\s*//' | sed 's/^["'"'"']//' | sed 's/["'"'"']$//')

          SLUG=$(basename "$FILE" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
          POST_URL="https://jmchoi4u.github.io/posts/${SLUG}/"

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "desc=$DESC" >> "$GITHUB_OUTPUT"
          echo "url=$POST_URL" >> "$GITHUB_OUTPUT"

      - name: Send notifications
        if: steps.check.outputs.has_new == 'true'
        run: |
          curl -s -X POST "https://jm-studio-auth.jmchoi4u.workers.dev/notify" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -d '{
              "title": "'"$(echo '${{ steps.info.outputs.title }}' | sed 's/"/\\"/g')"'",
              "url": "${{ steps.info.outputs.url }}",
              "description": "'"$(echo '${{ steps.info.outputs.desc }}' | sed 's/"/\\"/g')"'"
            }'
