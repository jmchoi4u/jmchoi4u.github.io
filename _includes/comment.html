{% if page.comments and site.comments.provider %}
  <section id="comments" aria-label="댓글" tabindex="-1">
    {% case site.comments.provider %}
      {% when 'giscus' %}
        {% include comments/giscus.html %}
      {% when 'utterances' %}
        {% include comments/utterances.html %}
      {% when 'disqus' %}
        {% include comments/disqus.html %}
    {% endcase %}
  </section>
{% endif %}
