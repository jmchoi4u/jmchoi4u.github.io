name: "Notify Subscribers"
on:
  push:
    branches: [main, master]
    paths:
      - "_posts/**"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for new posts
        id: check
        run: |
          NEW_FILES=$(git diff --name-status HEAD~1 HEAD -- _posts/ | grep '^A' | awk '{print $2}')
          if [ -z "$NEW_FILES" ]; then
            echo "No new posts found"
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FIRST_FILE=$(echo "$NEW_FILES" | head -1)
          echo "New post: $FIRST_FILE"
          echo "has_new=true" >> "$GITHUB_OUTPUT"
          echo "file=$FIRST_FILE" >> "$GITHUB_OUTPUT"

      - name: Extract post info
        if: steps.check.outputs.has_new == 'true'
        id: info
        run: |
          POST_FILE="${{ steps.check.outputs.file }}" python3 <<'PY' >> "$GITHUB_OUTPUT"
          import re
          import os
          from pathlib import Path

          file = Path(os.environ["POST_FILE"])
          content = file.read_text(encoding="utf-8")
          front_matter = {}

          if content.startswith("---\n"):
              end = content.find("\n---\n", 4)
              if end != -1:
                  for line in content[4:end].splitlines():
                      if not line or line[0].isspace() or ":" not in line:
                          continue
                      key, value = line.split(":", 1)
                      front_matter[key.strip()] = value.strip().strip("\"'")

          title = front_matter.get("title") or file.stem
          description = front_matter.get("description") or ""
          permalink = front_matter.get("permalink", "").strip()

          if permalink:
              path = "/" + permalink.strip("/")
          else:
              slug = re.sub(r"^\d{4}-\d{2}-\d{2}-", "", file.stem)
              path = f"/posts/{slug}"

          post_url = "https://jmchoi4u.github.io" + path.rstrip("/") + "/"

          def emit(name, value):
              marker = f"EOF_{name}"
              print(f"{name}<<{marker}")
              print(value)
              print(marker)

          emit("title", title)
          emit("desc", description)
          emit("url", post_url)
          PY

      - name: Send notifications
        if: steps.check.outputs.has_new == 'true'
        env:
          POST_TITLE: ${{ steps.info.outputs.title }}
          POST_URL: ${{ steps.info.outputs.url }}
          POST_DESC: ${{ steps.info.outputs.desc }}
        run: |
          python3 <<'PY'
          import json
          import os

          payload = {
              "title": os.environ["POST_TITLE"],
              "url": os.environ["POST_URL"],
              "description": os.environ["POST_DESC"],
          }

          with open("notify-payload.json", "w", encoding="utf-8") as file:
              json.dump(payload, file, ensure_ascii=False)
          PY

          curl -s -X POST "https://jm-studio-auth.jmchoi4u.workers.dev/notify" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            --data @notify-payload.json
