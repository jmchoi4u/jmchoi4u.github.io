<!-- Noto Sans KR (브런치 스타일) -->

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  /* ── 전체 폰트: Noto Sans KR (브런치 스타일) ── */
  body,
  #sidebar,
  #topbar,
  .post-meta,
  .post-tag-pill,
  .card,
  .categories,
  .tag,
  .breadcrumb,
  .pagination,
  .post-navigation,
  footer,
  input, button, select, textarea {
    font-family: "Noto Sans KR", "Malgun Gothic", -apple-system, sans-serif !important;
  }

  /* ── 본문: 너무 가늘지 않게, 읽기 편한 웨이트 ── */
  .content,
  .post-content,
  #content .content {
    font-family: "Noto Sans KR", "Malgun Gothic", sans-serif !important;
    font-weight: 400;
    letter-spacing: -0.2px;
    word-break: keep-all;
  }

  /* ── 제목: 500~700 웨이트 ── */
  h1, h2, h3, h4, h5, h6,
  .post-hero-content h1,
  .post-hero-center h1,
  .home-card .card-title,
  .card-title {
    font-family: "Noto Sans KR", "Malgun Gothic", sans-serif !important;
    font-weight: 700;
    letter-spacing: -0.8px;
  }

  .content h2, .content h3, .content h4 {
    font-weight: 500;
    letter-spacing: -0.5px;
  }

  /* ── 본문 bold는 조금 더 또렷하게 ── */
  .content strong,
  .content b {
    font-weight: 600;
  }

  /* ── 코드: 모노스페이스 유지 ── */
  .content code, .content pre,
  code, pre {
    font-family: "JetBrains Mono", "D2Coding", "Fira Code", monospace !important;
  }
